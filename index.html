<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <title>EAGLEBELAC</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; overflow: hidden; 
            font-family: monospace; height: 100vh; display: flex; 
            flex-direction: column; touch-action: none;
        }
        #frame {
            position: relative; flex-grow: 1; border: 20px double #ff0044;
            border-radius: 6px; box-shadow: 0 0 40px 20px rgba(138,43,226,0.6),
            inset 0 0 40px rgba(255,255,255,0.15); overflow: hidden; 
            background: #000; transition: border-color 0.4s ease;
        }
        #bgViewport {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 12px inset #111; border-radius: 4px; overflow: hidden;
        }
        #bgLayer {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0.85; transition: opacity 0.8s ease;
        }
        #coreViewport {
            position: absolute; left: 50%; top: 50%; width: 280px; height: 280px;
            transform: translate(-50%, -50%); border: 8px double #ffffff;
            border-radius: 12px; overflow: visible; background: rgba(0,0,0,0.3);
            z-index: 10;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        #ui {
            height: 100px; display: flex; justify-content: space-around;
            align-items: center; background: rgba(10,10,10,0.95);
            border-top: 2px solid #8a2be2; box-shadow: 0 -20px 30px #8a2be2;
        }
        .btn {
            width: 48px; height: 48px; border-radius: 50%; background: #0a0a0a;
            color: #fff; font-size: 24px; cursor: pointer; transition: all 0.35s;
            border: 1px double transparent; box-shadow: 0 0 20px currentColor;
        }
        .btn.active {
            transform: scale(1.25); box-shadow: 0 0 40px currentColor;
        }
        #play { color: #39ff14; border-color: #39ff14; }
        #prev { color: #ffef00; border-color: #ffef00; }
        #next { color: #89cff0; border-color: #89cff0; }
        #color { color: #b026ff; border-color: #b026ff; }
    </style>
</head>
<body>
    <div id="frame">
        <div id="bgViewport">
            <div id="bgLayer"></div>
        </div>
        <div id="coreViewport">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <div id="ui">
        <button class="btn active" id="play">GO</button>
        <button class="btn" id="prev">👻</button>
        <button class="btn" id="next">🌶️</button>
        <button class="btn" id="color">🤯</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script id="vShader" type="x-shader/x-vertex">
        varying vec2 vUv; varying float vDist; uniform float time;
        void main() {
            vUv = uv; vec3 pos = position;
            pos += normal * sin(time * 2.0 + position.y * 0.5) * 0.3;
            vDist = length(pos); gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>
    <script id="fShader" type="x-shader/x-fragment">
        uniform float time, glow, bass, mid, high; uniform sampler2D tex;
        varying vec2 vUv; varying float vDist;
        vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
        float noise(vec2 v){
            const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
            vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);
            vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
            vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);
            vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
            vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
            m=m*m;m=m*m;vec3 x=2.0*fract(p*C.www)-1.0;
            vec3 h=abs(x)-0.5;vec3 a0=x-floor(x+0.5);
            m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
            vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
            return 130.0*dot(m,g);
        }
        void main(){
            vec2 uv=vUv;float n=noise(uv*8.0+time*0.3);
            uv+=n*0.02*(bass+0.3);uv.x+=sin(time*3.0+uv.y*10.0)*0.015*mid;
            uv.y+=cos(time*2.5+uv.x*8.0)*0.012*high;
            vec4 c=texture2D(tex,uv);vec3 col=c.rgb;
            col.r+=bass*0.4;col.g+=mid*0.3;col.b+=high*0.5;col=clamp(col,0.0,1.0);
            float glowFalloff=1.0-smoothstep(0.2,0.8,vDist/30.0);
            gl_FragColor=vec4(col*(glow*glowFalloff),c.a*glowFalloff);
        }
    </script>

    <script>
        // ────────────────────────────────────────────────
        // SULTAN47 CORE ENGINE – FIXED & MOBILE OPTIMIZED
        // ────────────────────────────────────────────────

        let scene, camera, renderer, mainCore, spawnedCores = [];
        let audioContext, analyser, currentAudio = null, currentSource = null;
        let trackIdx = 0, colorIdx = 0, bgIdx = 0, bgTimer = null, coreTimer = 0;
        let bassEnergy = 0, midEnergy = 0, highEnergy = 0;

        const coreTextures = [
            ['assets/core/a.jpeg','assets/core/aa.jpeg','assets/core/aaa.jpeg','assets/core/aaaa.jpeg','assets/core/aaaaa.jpeg'],
            ['assets/core/b.jpeg','assets/core/bb.jpeg','assets/core/bbb.jpeg','assets/core/bbbb.jpeg','assets/core/bbbbb.jpeg'],
            ['assets/core/c.jpeg','assets/core/cc.jpeg','assets/core/ccc.jpeg','assets/core/cccc.jpeg','assets/core/ccccc.jpeg'],
            ['assets/core/d.jpeg','assets/core/dd.jpeg','assets/core/ddd.jpeg','assets/core/dddd.jpeg','assets/core/ddddd.jpeg'],
            ['assets/core/e.jpeg','assets/core/ee.jpeg','assets/core/eee.jpeg','assets/core/eeee.jpeg','assets/core/eeeee.jpeg']
        ];

        const bgSequences = [
            ['assets/bg/1.jpeg','assets/bg/11.jpeg','assets/bg/111.jpeg','assets/bg/1111.jpeg','assets/bg/11111.jpeg'],
            ['assets/bg/2.jpeg','assets/bg/22.jpeg','assets/bg/222.jpeg','assets/bg/2222.jpeg','assets/bg/22222.jpeg'],
            ['assets/bg/3.jpeg','assets/bg/33.jpeg','assets/bg/333.jpeg','assets/bg/3333.jpeg','assets/bg/33333.jpeg'],
            ['assets/bg/4.jpeg','assets/bg/44.jpeg','assets/bg/444.jpeg','assets/bg/4444.jpeg','assets/bg/44444.jpeg'],
            ['assets/bg/5.jpeg','assets/bg/55.jpeg','assets/bg/555.jpeg','assets/bg/5555.jpeg','assets/bg/55555.jpeg']
        ];

        const audioFiles = ['1.mp3','2.mp3','3.mp3','4.mp3','5.mp3'];
        const frameColors = ['#ff0044','#39ff14','#89cff0','#ffef00','#b026ff'];

        const loader = new THREE.TextureLoader();

        // Audio pool – reuse instead of recreating
        const audioPool = audioFiles.map(file => {
            const a = new Audio(file);
            a.preload = 'auto';
            a.crossOrigin = 'anonymous';
            a.loop = true;
            return a;
        });

        async function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                analyser.smoothingTimeConstant = 0.75;
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
        }

        function updateAudioAnalysis() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);

            let bass = 0, mid = 0, high = 0;
            const len = data.length;
            for (let i = 0; i < len; i++) {
                if (i < len * 0.15) bass += data[i];
                else if (i < len * 0.5) mid += data[i];
                else high += data[i];
            }
            bassEnergy = (bass / (len * 0.15 * 255)) || 0;
            midEnergy  = (mid  / (len * 0.35 * 255)) || 0;
            highEnergy = (high / (len * 0.5  * 255)) || 0;

            if (mainCore?.material?.uniforms) {
                mainCore.material.uniforms.bass.value = bassEnergy;
                mainCore.material.uniforms.mid.value  = midEnergy;
                mainCore.material.uniforms.high.value = highEnergy;
            }
        }

        function switchTrack(direction = 0) {
            initAudio();

            // Clean previous
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (currentSource) {
                currentSource.disconnect();
                currentSource = null;
            }

            trackIdx = (trackIdx + direction + 5) % 5;
            currentAudio = audioPool[trackIdx];

            // Reconnect
            currentSource = audioContext.createMediaElementSource(currentAudio);
            currentSource.connect(analyser);
            analyser.connect(audioContext.destination);

            currentAudio.currentTime = 0;
            currentAudio.play().catch(e => console.log("Play failed:", e));

            document.getElementById('play').textContent = '⏸';

            // Core texture (start of sequence)
            const texPath = coreTextures[trackIdx][0];
            loader.load(texPath, tex => {
                if (mainCore?.material?.uniforms) {
                    mainCore.material.uniforms.tex.value = tex;
                    mainCore.material.needsUpdate = true;
                }
            }, undefined, err => console.warn("Core load failed:", texPath));

            // Background sequence – 5s per image, reset per track
            if (bgTimer) clearInterval(bgTimer);
            bgIdx = 0;
            const bgSet = bgSequences[trackIdx];
            document.getElementById('bgLayer').style.backgroundImage = `url(${bgSet[0]})`;

            bgTimer = setInterval(() => {
                bgIdx = (bgIdx + 1) % bgSet.length;
                document.getElementById('bgLayer').style.backgroundImage = `url(${bgSet[bgIdx]})`;
            }, 5000);
        }

        function cycleFrameColor() {
            colorIdx = (colorIdx + 1) % frameColors.length;
            const col = frameColors[colorIdx];
            document.getElementById('frame').style.borderColor = col;
            document.getElementById('frame').style.boxShadow = 
                `0 0 40px 25px ${col}, inset 0 0 80px ${col}30`;
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('canvas'), 
                antialias: true, 
                powerPreference: "high-performance" 
            });
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            const uniforms = {
                time: { value: 0 },
                glow: { value: 2.0 },
                tex: { value: null },
                bass: { value: 0 },
                mid: { value: 0 },
                high: { value: 0 }
            };

            mainCore = new THREE.Mesh(
                new THREE.SphereGeometry(18, 128, 128),
                new THREE.ShaderMaterial({
                    uniforms,
                    vertexShader: document.getElementById('vShader').textContent,
                    fragmentShader: document.getElementById('fShader').textContent,
                    transparent: true
                })
            );
            scene.add(mainCore);
            camera.position.z = 70;

            // Initial texture
            loader.load(coreTextures[0][0], tex => {
                mainCore.material.uniforms.tex.value = tex;
                mainCore.material.needsUpdate = true;
            });

            // Spawned cores pool
            for (let i = 0; i < 12; i++) {
                const clone = mainCore.clone();
                clone.material = mainCore.material.clone();
                clone.scale.setScalar(0.5);
                scene.add(clone);
                spawnedCores.push({
                    mesh: clone,
                    life: Math.random() * 4 + 4,
                    maxLife: 8,
                    angle: Math.random() * Math.PI * 2,
                    radius: 28 + Math.random() * 12,
                    orbitSpeed: 0.4 + Math.random() * 0.8
                });
            }

            animate();
        }

        function animate(time = 0) {
            requestAnimationFrame(animate);

            coreTimer += 1/60;
            if (coreTimer > 8) {
                // Optional: cycle core texture sequence if desired
                coreTimer = 0;
            }

            updateAudioAnalysis();

            // Update spawned cores
            spawnedCores.forEach(core => {
                core.life -= 1/60;
                if (core.life <= 0) core.life = core.maxLife; // loop instead of remove

                core.angle += 1/60 * core.orbitSpeed * (1 + bassEnergy * 0.8);
                core.mesh.position.x = Math.cos(core.angle) * core.radius;
                core.mesh.position.y = Math.sin(core.angle * 0.7) * core.radius * 0.6;
                core.mesh.position.z = Math.sin(core.angle * 1.3) * 6;

                const pulse = Math.sin(time * 3 + core.angle) * 0.08;
                core.mesh.scale.setScalar(0.5 * (1 + pulse + bassEnergy * 0.3));

                // Fade with life
                core.mesh.material.uniforms.opacity = { value: core.life / core.maxLife * 0.7 };
            });

            mainCore.material.uniforms.time.value = time * 0.001;
            mainCore.rotation.y += 0.005 + bassEnergy * 0.02;

            renderer.render(scene, camera);
        }

        // ─── Event listeners ────────────────────────────────────────

        document.getElementById('play').onclick = () => {
            initAudio().then(() => {
                if (!currentAudio) switchTrack(0);
                else if (currentAudio.paused) {
                    currentAudio.play();
                    document.getElementById('play').textContent = '⏸';
                } else {
                    currentAudio.pause();
                    document.getElementById('play').textContent = '▶';
                }
            });
        };

        document.getElementById('prev').onclick = () => switchTrack(-1);
        document.getElementById('next').onclick = () => switchTrack(1);
        document.getElementById('color').onclick = cycleFrameColor;

        // Resize
        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(console.error);
        }

        // Start engine immediately
        initThree();
    </script>
</body>
</html>
