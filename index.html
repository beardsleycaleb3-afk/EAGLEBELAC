<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>EAGLEBELAC</title>
    <style>
    :root {
        --black: #000000;
        --white: #ffffff;
    }

    body {
        margin:0; padding:0; background:#000; overflow:hidden; touch-action:none;
        font-family: monospace;
    }

    #app { height:100vh; display:flex; flex-direction:column; position:relative; }

    #frame {
        position: relative; flex-grow: 1;
        border: 20px double #ff0044;                   /* default red double border */
        border-radius: 6px;
        box-shadow: 
            0 0 40px 20px rgba(138,43,226,0.6),        /* violet outer glow */
            inset 0 0 40px rgba(255,255,255,0.15);     /* subtle inner white */
        overflow: hidden; background: #000;
        transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* Remove animated ::after — keep it clean/solid */
    canvas { display:block; width:100%; height:100%; }

    #ui {
        height: 100px; display:flex; justify-content:space-around; align-items:center; flex-wrap:wrap; gap:2px;
        padding:6px 0; background:rgba(10,10,10,0.95); border-top:2px solid #8a2be2;
        box-shadow:0 -20px 30px #8a2be2;
    }

    .b {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: #0a0a0a;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        transition: all 0.35s ease;
        box-shadow: 0 0 20px currentColor, inset 0 0 14px rgba(0,0,0,0.9);
        position: relative;
        border: 1px double transparent;                /* double outline base */
    }

    .b::before {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1px double transparent;
        pointer-events: none;
        opacity: 0.7;
    }

    /* Each button’s primary + secondary colors */
    #btn0 { color: #c8102e; border-color: #c8102e; }          /* Brick Red */
    #btn0::before { border-color: #dc143c; }                  /* Crimson glow */

    #btn1 { color: #39ff14; border-color: #39ff14; }          /* Neon Green */
    #btn1::before { border-color: #228b22; }                  /* Forest Green accent */

    #btn2 { color: #89cff0; border-color: #89cff0; }          /* Baby Blue */
    #btn2::before { border-color: #4169e1; }                  /* Royal Blue glow */

    #btn3 { color: #ffef00; border-color: #ffef00; }          /* Canary Yellow */
    #btn3::before { border-color: #cc5500; }                  /* Burnt Orange accent */

    #btn4 { color: #b026ff; border-color: #b026ff; }          /* Neon Violet */
    #btn4::before { border-color: #9400d3; }                  /* Ultra Violet glow */

    /* Active state — button grows, frame changes to match button’s primary color */
    .b.active {
        transform: scale(1.25) rotate(1deg);
        box-shadow: 0 0 40px 35px currentColor, inset 0 0 25px currentColor !important;
    }

    .b.active::before {
        opacity: 1;
        animation: buttonPulse 1.4s infinite;
    }

    /* When any button is active, frame border becomes that button’s primary color */
    #btn0.active ~ #frame { border-color: #c8102e; box-shadow: 0 0 40px 25px #c8102e, inset 0 0 80px rgba(200,16,46,0.4); }
    #btn1.active ~ #frame { border-color: #39ff14; box-shadow: 0 0 40px 25px #39ff14, inset 0 0 80px rgba(57,255,20,0.4); }
    #btn2.active ~ #frame { border-color: #89cff0; box-shadow: 0 0 40px 25px #89cff0, inset 0 0 80px rgba(137,207,240,0.4); }
    #btn3.active ~ #frame { border-color: #ffef00; box-shadow: 0 0 40px 25px #ffef00, inset 0 0 80px rgba(255,239,0,0.4); }
    #btn4.active ~ #frame { border-color: #b026ff; box-shadow: 0 0 40px 25px #b026ff, inset 0 0 80px rgba(176,38,255,0.4); }

    @keyframes buttonPulse {
        0%,100% { transform: scale(1); opacity: 0.8; }
        50%     { transform: scale(1.12); opacity: 1; }
    }

    /* NEW: Visual feedback for audio levels */
    #bassMeter, #midMeter, #highMeter {
        position: absolute;
        bottom: 110px;
        width: 6px;
        height: 40px;
        background: rgba(255,255,255,0.3);
        border-radius: 3px;
        transition: height 0.1s ease;
        z-index: 10;
    }

    #bassMeter { left: 20px; background: #c8102e; }
    #midMeter { left: 50%; transform: translateX(-50%); background: #39ff14; }
    #highMeter { right: 20px; background: #b026ff; }
    </style>
</head>
<body>
    <div id="app">
        <div id="frame">
            <canvas id="canvas"></canvas>
            
            <!-- NEW: Live audio meters -->
            <div id="bassMeter" style="height:20px;"></div>
            <div id="midMeter" style="height:20px;"></div>
            <div id="highMeter" style="height:20px;"></div>
        </div>

        <div id="ui">
            <button class="b active" id="btn0" onclick="cycle(0)">€</button>
            <button class="b" id="btn1" onclick="cycle(1)">Δ</button>
            <button class="b" id="btn2" onclick="cycle(2)">G</button>
            <button class="b" id="btn3" onclick="cycle(3)">|</button>
            <button class="b" id="btn4" onclick="cycle(4)">E</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying float vDist;
        uniform float time;
        void main() {
            vUv = uv;
            vec3 pos = position;
            // NEW: Audio-driven vertex displacement
            pos += normal * sin(time * 2.0 + position.y * 0.5) * 0.3;
            vDist = length(pos);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>
    <script id="fShader" type="x-shader/x-fragment">
        uniform float time; 
        uniform float glow; 
        uniform float bass; 
        uniform float mid; 
        uniform float high; 
        uniform sampler2D tex; 
        varying vec2 vUv;
        varying float vDist;
        
        // NEW: Perlin noise for organic movement
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        
        float noise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);
            vec2 i1;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ; m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }
        
        void main() { 
            vec2 uv = vUv;
            // NEW: Noise + audio distortion
            float n = noise(uv * 8.0 + time * 0.3);
            uv += n * 0.02 * (bass + 0.3);
            uv.x += sin(time * 3.0 + uv.y * 10.0) * 0.015 * mid;
            uv.y += cos(time * 2.5 + uv.x * 8.0) * 0.012 * high;
            
            vec4 c = texture2D(tex, uv);
            // NEW: Audio-driven color shift
            vec3 col = c.rgb;
            col.r += bass * 0.4;
            col.g += mid * 0.3;
            col.b += high * 0.5;
            col = clamp(col, 0.0, 1.0);
            
            // NEW: Glow based on distance
            float glowFalloff = 1.0 - smoothstep(0.2, 0.8, vDist / 30.0);
            gl_FragColor = vec4(col * (glow * glowFalloff), c.a * glowFalloff); 
        }
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true,
            powerPreference: "high-performance" // NEW: Better mobile perf
        });
        
        // NEW: Tone mapping for better glows
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const loader = new THREE.TextureLoader();

        const coreMap = [['a.jpeg','aa.jpeg','aaa.jpeg','aaaa.jpeg','aaaaa.jpeg'],['b.jpeg','bb.jpeg','bbb.jpeg','bbbb.jpeg','bbbbb.jpeg'],['c.jpeg','cc.jpeg','ccc.jpeg','cccc.jpeg','ccccc.jpeg'],['d.jpeg','dd.jpeg','ddd.jpeg','dddd.jpeg','ddddd.jpeg'],['e.jpeg','ee.jpeg','eee.jpeg','eeee.jpeg','eeeee.jpeg']];
        const bgMap = [['1.jpeg','11.jpeg','111.jpeg','1111.jpeg','11111.jpeg'],['2.jpeg','22.jpeg','222.jpeg','2222.jpeg','22222.jpeg'],['3.jpeg','33.jpeg','333.jpeg','3333.jpeg','33333.jpeg'],['4.jpeg','44.jpeg','444.jpeg','4444.jpeg','44444.jpeg'],['5.jpeg','55.jpeg','555.jpeg','5555.jpeg','55555.jpeg']];
        const audioMap = ['1.mp3','2.mp3','3.mp3','4.mp3','5.mp3'];

        const coreTextures = coreMap.map(row => row.map(f => loader.load('assets/core/' + f)));
        const audioElements = audioMap.map(file => { 
            const a = new Audio(file); 
            a.preload = 'auto'; 
            a.crossOrigin = 'anonymous'; // NEW: Better audio context compatibility
            return a; 
        });

        const trackSpecs = [{ bpm: 87 }, { bpm: 87 }, { bpm: 87 }, { bpm: 73 }, { bpm: 123 }];

        let currentTrack = 0;
        let currentAudio = null;
        let audioContext, analyser, source;
        let bassEnergy = 0, midEnergy = 0, highEnergy = 0;

        // NEW: Expanded uniforms for audio data
        const uniforms = { 
            time:{value:0}, 
            glow:{value:2.0}, 
            tex:{value:coreTextures[0][0]},
            bass: {value: 0.0},
            mid: {value: 0.0},
            high: {value: 0.0}
        };

        const mainCore = new THREE.Mesh(new THREE.SphereGeometry(18, 128, 128), // NEW: Higher detail
            new THREE.ShaderMaterial({ 
                uniforms, 
                vertexShader: document.getElementById('vShader').textContent, 
                fragmentShader: document.getElementById('fShader').textContent 
            })
        );
        scene.add(mainCore);
        camera.position.z = 70;

        let subIndex = 0;

        // NEW: Preload all assets for instant switching
        const preloadedBgs = {};
        bgMap.forEach((row, idx) => {
            row.forEach((file, sidx) => {
                loader.load(`assets/bg/${file}`, tex => {
                    tex.flipY = false;
                    tex.encoding = THREE.sRGBEncoding;
                    preloadedBgs[`${idx}_${sidx}`] = tex;
                });
            });
        });

        // Initial state on load
        window.addEventListener('load', () => {
            if (preloadedBgs['0_0']) {
                scene.background = preloadedBgs['0_0'];
            }
            mainCore.material.uniforms.tex.value = coreTextures[0][0];
            mainCore.material.needsUpdate = true;
        });

        // Resize with better handling
        function resize() {
            const rect = canvas.getBoundingClientRect();
            camera.aspect = rect.width / rect.height;
            camera.updateProjectionMatrix();
            renderer.setSize(rect.width, rect.height, false);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        }
        window.addEventListener('resize', resize);
        resize();

        // NEW: Better audio handling with resume on interaction
        function initAudio() { 
            if (audioContext && audioContext.state !== 'suspended') return; 
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            analyser = audioContext.createAnalyser(); 
            analyser.fftSize = 1024; // NEW: Higher resolution
            analyser.smoothingTimeConstant = 0.6; // NEW: Smoother response
        }

        function connectAnalyser(audio) {
            if (source) source.disconnect();
            initAudio();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        function updateAudio() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            
            // NEW: Better frequency bucketing
            bassEnergy = 0; midEnergy = 0; highEnergy = 0;
            const bassEnd = Math.floor(data.length * 0.2);
            const midEnd = Math.floor(data.length * 0.6);
            
            for (let i = 0; i < bassEnd; i++) bassEnergy += data[i];
            for (let i = bassEnd; i < midEnd; i++) midEnergy += data[i];
            for (let i = midEnd; i < data.length; i++) highEnergy += data[i];
            
            bassEnergy /= bassEnd * 255; 
            midEnergy /= (midEnd - bassEnd) * 255; 
            highEnergy /= (data.length - midEnd) * 255;
            
            // NEW: Update meters
            document.getElementById('bassMeter').style.height = `${20 + bassEnergy * 60}px`;
            document.getElementById('midMeter').style.height = `${20 + midEnergy * 60}px`;
            document.getElementById('highMeter').style.height = `${20 + highEnergy * 60}px`;
            
            // NEW: Pass to shader
            mainCore.material.uniforms.bass.value = bassEnergy;
            mainCore.material.uniforms.mid.value = midEnergy;
            mainCore.material.uniforms.high.value = highEnergy;
        }

        // Spawned cores with spiral orbits + recursive spawn on death + more frequent
        const MAX_CORES = 180; // NEW: More particles
        const spawnedCores = [];
        const corePool = [];

        class SpawnedCore {
            constructor() { 
                this.mesh = null; 
                this.angle = 0; 
                this.radius = 0; 
                this.orbitSpeed = 0; 
            }
            init(pos, scale, life) {
                if (corePool.length) { 
                    this.mesh = corePool.pop();
                    this.mesh.material.uniforms = mainCore.material.uniforms; // NEW: Shared uniforms
                } else {
                    this.mesh = mainCore.clone();
                    this.mesh.material = this.mesh.material.clone();
                    this.mesh.material.uniforms = mainCore.material.uniforms;
                }
                this.mesh.position.copy(pos);
                this.mesh.scale.setScalar(scale);
                scene.add(this.mesh);

                this.life = this.maxLife = life;
                this.baseScale = scale;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = pos.length() || 30;
                this.orbitSpeed = 1.5 + Math.random() * 2.5;
                this.shakeAmp = 0.35 + Math.random() * 0.5;
            }
            update(delta, t) {
                this.life -= delta;
                if (this.life <= 0) {
                    scene.remove(this.mesh);
                    corePool.push(this.mesh);
                    // Recursive spawn on death (more children on high bass)
                    const childCount = 2 + Math.floor(bassEnergy * 5);
                    if (childCount > 0) spawnCores(childCount, this.mesh.position);
                    return false;
                }

                const progress = this.life / this.maxLife;

                // Spiral orbit + radius change on bass
                this.angle += delta * this.orbitSpeed * (1 + bassEnergy * 3);
                this.radius += delta * (bassEnergy * 25 - 8); // expand fast on drop, slow contract
                this.radius = Math.max(20, this.radius);

                this.mesh.position.x = Math.cos(this.angle) * this.radius;
                this.mesh.position.y = Math.sin(this.angle * 0.8) * this.radius * 0.65 + Math.sin(t * 4) * 6;
                this.mesh.position.z = Math.sin(this.angle * 1.4) * 15;

                // Rotation + shake
                this.mesh.rotation.y += delta * (1.2 + bassEnergy * 4);
                const shake = (Math.random() - 0.5) * this.shakeAmp * (1 - progress * 0.3);
                this.mesh.position.x += shake;
                this.mesh.position.y += shake * 0.7;

                // Pulse + fade
                const pulse = Math.sin(t * 10 + progress * 15) * (0.1 + bassEnergy * 0.35);
                const fadeScale = progress < 0.65 ? progress * 1.5 : 1;
                this.mesh.scale.setScalar(this.baseScale * (1 + pulse) * fadeScale);

                this.mesh.material.uniforms.glow.value = progress * 2.8 + highEnergy * 0.8;

                return true;
            }
        }

        function spawnCores(count, center = new THREE.Vector3(0,0,0)) {
            for (let i = 0; i < count && spawnedCores.length < MAX_CORES; i++) {
                const core = new SpawnedCore();
                const angle = i * 2.39996 + t * 0.0005; // t from animate for dynamic
                const dist = 28 + Math.sqrt(i) * 8;
                const pos = center.clone().add(new THREE.Vector3(
                    Math.cos(angle) * dist,
                    Math.sin(angle) * dist * 0.75,
                    Math.sin(angle * 1.3) * 20
                ));
                core.init(pos, 0.5 + Math.random() * 0.8, 6.0 + Math.random() * 6.0);
                spawnedCores.push(core);
            }
        }

        function updateSpawnedCores(delta, t) {
            for (let i = spawnedCores.length - 1; i >= 0; i--) {
                if (!spawnedCores[i].update(delta, t)) spawnedCores.splice(i, 1);
            }
        }

        function clearAllCores() {
            spawnedCores.forEach(c => scene.remove(c.mesh));
            spawnedCores.length = 0;
        }

        // Cycle (clear + swap + spawn burst)
        function cycle(idx) {
            clearAllCores();

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = audioElements[idx];
            currentAudio.currentTime = 0;
            currentAudio.play().catch(e => console.log('Audio play failed:', e));
            connectAnalyser(currentAudio);

            // Core texture swap
            mainCore.material.uniforms.tex.value = coreTextures[idx][subIndex];
            mainCore.material.needsUpdate = true;

            // Background swap with preloaded
            const bgKey = `${idx}_${subIndex}`;
            if (preloadedBgs[bgKey]) {
                scene.background = preloadedBgs[bgKey];
            } else {
                loader.load('assets/bg/' + bgMap[idx][subIndex], tex => {
                    tex.flipY = false;
                    tex.encoding = THREE.sRGBEncoding;
                    tex.needsUpdate = true;
                    scene.background = tex;
                });
            }

            subIndex = (subIndex + 1) % 5;

            spawnCores(16); // strong burst on switch

            document.querySelectorAll('.b').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${idx}`).classList.add('active');

            currentTrack = idx;
        }

        // NEW: Touch controls for mobile
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const deltaY = (e.touches[0].clientY - touchStartY) * 0.01;
            camera.position.y += deltaY;
            touchStartY = e.touches[0].clientY;
        });

        // NEW: Keyboard controls
        document.addEventListener('keydown', e => {
            const idx = parseInt(e.key);
            if (idx >= 0 && idx <= 4) cycle(idx);
        });

        // Animate with more frequent spawns on bass
        let lastTime = 0;
        let lastBassDrop = 0;
        let t = 0; // NEW: Global time for spawn timing
        function animate(time = 0) {
            requestAnimationFrame(animate);
            const delta = Math.min((time - lastTime) / 1000, 0.06);
            lastTime = time;
            t += delta;

            uniforms.time.value = t;

            updateAudio();
            updateSpawnedCores(delta, t);

            // Main core slow spin + wandering
            mainCore.rotation.y += delta * 0.18;
            mainCore.position.x = Math.sin(t * 0.0007) * (10 + bassEnergy * 25);
            mainCore.position.y = Math.cos(t * 0.001) * (6 + bassEnergy * 15);

            // Bass drop → big spawn burst + orbit boost
            if (bassEnergy > 1.4 && time - lastBassDrop > 0.35) {  
                lastBassDrop = time;
                spawnCores(20 + Math.floor(bassEnergy * 10)); 
            }

            // Gentle continuous spawn if bass decent
            if (bassEnergy > 0.8 && Math.random() < 0.4) {
                spawnCores(3 + Math.floor(bassEnergy * 4));
            }

            const pulse = 1 + Math.sin(t * 0.005 * (trackSpecs[currentTrack].bpm / 60)) * (0.07 + bassEnergy * 0.25);
            mainCore.scale.setScalar(pulse);

            const shake = (Math.random() - 0.5) * (0.05 + bassEnergy * 0.2);
            mainCore.position.x += shake;
            mainCore.position.y += shake * 0.5;

            uniforms.glow.value = 2.0 + midEnergy * 0.7 + highEnergy * 0.5;

            renderer.render(scene, camera);
        }
        animate();

        // NEW: Enhanced PWA features
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Optional: Add install button logic here
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }

        // NEW: Visibility handling for background pause
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && currentAudio) {
                currentAudio.pause();
            } else if (!document.hidden && currentAudio) {
                currentAudio.play().catch(() => {});
            }
        });

        console.log('EAGLEBELAC loaded. Hotkeys 0-4 to cycle tracks.');
    </script>
</body>
</html>
